# RuneBolt Production Docker Compose
# Version: 1.0.0
# Usage: docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ============================================
  # FRONTEND (Next.js)
  # ============================================
  frontend:
    image: ghcr.io/bitmap-asset/runebolt-frontend:${VERSION:-latest}
    container_name: runebolt-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.runebolt.io}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://ws.runebolt.io}
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - frontend
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # BACKEND API
  # ============================================
  backend-api:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
      target: production
    image: runebolt-backend:local
    container_name: runebolt-backend-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/data/runebolt.db
      - VAULT_ADDR=http://vault:8200
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:5432/runebolt
      - POSTGRES_USER=${POSTGRES_USER:-runebolt}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NETWORK=${NETWORK:-mainnet}
      - MEMPOOL_API=${MEMPOOL_API:-https://mempool.space/api}
      - RUNEBOLT_XPUB=${RUNEBOLT_XPUB}
      - RUNEBOLT_PRIVKEY=${RUNEBOLT_PRIVKEY}
      - VAULT_TOKEN=${VAULT_TOKEN}
    volumes:
      - backend-data:/data
      - ./logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - backend
      - frontend
      - database
      - cache
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # BACKEND WORKERS
  # ============================================
  backend-worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
      target: worker
    image: runebolt-backend:local
    container_name: runebolt-backend-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VAULT_ADDR=http://vault:8200
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:5432/runebolt
      - POSTGRES_USER=${POSTGRES_USER:-runebolt}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NETWORK=${NETWORK:-mainnet}
      - MEMPOOL_API=${MEMPOOL_API:-https://mempool.space/api}
      - RUNEBOLT_XPUB=${RUNEBOLT_XPUB}
      - RUNEBOLT_PRIVKEY=${RUNEBOLT_PRIVKEY}
    volumes:
      - backend-data:/data
      - ./logs/worker:/app/logs
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - backend
      - database
      - cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # LOAD BALANCER (HAProxy)
  # ============================================
  haproxy:
    image: haproxy:2.8-alpine
    container_name: runebolt-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"
    volumes:
      - ./infrastructure/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./infrastructure/ssl/certs:/etc/ssl/certs:ro
      - ./infrastructure/ssl/private:/etc/ssl/private:ro
    networks:
      - frontend
      - backend
    depends_on:
      - frontend
      - backend-api
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # POSTGRESQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: runebolt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=runebolt
      - POSTGRES_USER=${POSTGRES_USER:-runebolt}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-wal:/var/lib/postgresql/wal
      - ./backups/postgres:/backups
      - ./infrastructure/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runebolt} -d runebolt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - database
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # PGBOUNCER (Connection Pooling)
  # ============================================
  pgbouncer:
    image: pgbouncer/pgbouncer:1.20
    container_name: runebolt-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      - DATABASES_HOST=postgres
      - DATABASES_PORT=5432
      - DATABASES_DATABASE=runebolt
      - DATABASES_USER=${POSTGRES_USER:-runebolt}
      - DATABASES_PASSWORD=${POSTGRES_PASSWORD}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
      - RESERVE_POOL_SIZE=5
      - MAX_DB_CONNECTIONS=100
      - SERVER_IDLE_TIMEOUT=600
      - SERVER_LIFETIME=3600
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    networks:
      - database
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # REDIS
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: runebolt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --dir /data
    volumes:
      - redis-data:/data
      - ./backups/redis:/backups
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - cache
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # HASHICORP VAULT
  # ============================================
  vault:
    image: hashicorp/vault:1.15
    container_name: runebolt-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
      - VAULT_LOCAL_CONFIG=${VAULT_LOCAL_CONFIG}
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID}
    volumes:
      - vault-data:/vault/file
      - ./infrastructure/vault/config:/vault/config:ro
      - ./infrastructure/vault/policies:/vault/policies:ro
    command: server -config=/vault/config/vault.hcl
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # PROMETHEUS
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48
    container_name: runebolt-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # GRAFANA
  # ============================================
  grafana:
    image: grafana/grafana:10.2
    container_name: runebolt-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://grafana.runebolt.io}
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST}
      - GF_SMTP_USER=${GF_SMTP_USER}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS}
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/notifiers:/etc/grafana/provisioning/notifiers:ro
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # LOKI (Log Aggregation)
  # ============================================
  loki:
    image: grafana/loki:2.9
    container_name: runebolt-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # PROMTAIL (Log Shipper)
  # ============================================
  promtail:
    image: grafana/promtail:2.9
    container_name: runebolt-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/runebolt:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ============================================
# NETWORKS
# ============================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false
  database:
    driver: bridge
    internal: false
  cache:
    driver: bridge
    internal: false
  monitoring:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  backend-data:
    driver: local
  postgres-data:
    driver: local
  postgres-wal:
    driver: local
  redis-data:
    driver: local
  vault-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

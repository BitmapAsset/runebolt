<!-- Billy - Billion Dollar Cat (Right Bottom) -->
<svg id="billy-cat" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btcGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.4" />
    </linearGradient>
    <filter id="catGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f0f1a"/>
  
  <!-- Bitcoin Aura -->
  <circle cx="200" cy="150" r="100" fill="url(#btcGlow)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Billy Character -->
  <g transform="translate(200, 160)" filter="url(#catGlow)">
    <!-- Tail -->
    <path d="M 40 60 Q 80 40 70 0" stroke="#E8E8E8" stroke-width="12" fill="none">
      <animate attributeName="d" values="M 40 60 Q 80 40 70 0; M 40 60 Q 90 50 75 10; M 40 60 Q 80 40 70 0" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="45" ry="55" fill="url(#silverGrad)"/>
    
    <!-- Chest Patch -->
    <ellipse cx="0" cy="30" rx="20" ry="25" fill="#FFF"/>
    
    <!-- Head -->
    <circle cx="0" cy="-20" r="40" fill="url(#silverGrad)"/>
    
    <!-- Ears -->
    <polygon points="-30,-45 -50,-75 -10,-55" fill="#E8E8E8"/>
    <polygon points="30,-45 50,-75 10,-55" fill="#E8E8E8"/>
    <polygon points="-35,-50 -45,-70 -20,-55" fill="#FFB6C1"/>
    <polygon points="35,-50 45,-70 20,-55" fill="#FFB6C1"/>
    
    <!-- Face -->
    <ellipse cx="-12" cy="-25" rx="8" ry="10" fill="#FFF"/>
    <ellipse cx="12" cy="-25" rx="8" ry="10" fill="#FFF"/>
    <circle cx="-10" cy="-25" r="4" fill="#00CED1">
      <animate attributeName="r" values="4;4.5;4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="-25" r="4" fill="#00CED1">
      <animate attributeName="r" values="4;4.5;4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-10" cy="-25" r="2" fill="#000"/>
    <circle cx="10" cy="-25" r="2" fill="#000"/>
    
    <!-- Nose -->
    <polygon points="0,-15 -5,-8 5,-8" fill="#FFB6C1"/>
    
    <!-- Mouth -->
    <path d="M 0,-8 Q -10,0 -20,-5" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M 0,-8 Q 10,0 20,-5" stroke="#333" stroke-width="2" fill="none"/>
    
    <!-- Whiskers -->
    <line x1="-25" y1="-10" x2="-50" y2="-15" stroke="#666" stroke-width="1"/>
    <line x1="-25" y1="-5" x2="-50" y2="-5" stroke="#666" stroke-width="1"/>
    <line x1="-25" y1="0" x2="-50" y2="5" stroke="#666" stroke-width="1"/>
    <line x1="25" y1="-10" x2="50" y2="-15" stroke="#666" stroke-width="1"/>
    <line x1="25" y1="-5" x2="50" y2="-5" stroke="#666" stroke-width="1"/>
    <line x1="25" y1="0" x2="50" y2="5" stroke="#666" stroke-width="1"/>
    
    <!-- Bitcoin Collar -->
    <rect x="-25" y="10" width="50" height="8" rx="4" fill="#F7931A"/>
    <circle cx="0" cy="20" r="8" fill="#FFD700"/>
    <text x="0" y="24" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold">₿</text>
    
    <!-- Paws -->
    <ellipse cx="-25" cy="85" rx="12" ry="8" fill="#E8E8E8"/>
    <ellipse cx="25" cy="85" rx="12" ry="8" fill="#E8E8E8"/>
    
    <!-- Floating Animation -->
    <animateTransform attributeName="transform" type="translate" values="200,160; 200,155; 200,160" dur="2.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" fill="#C0C0C0" font-size="22" font-weight="bold">BILLION DOLLAR CAT</text>
  <text x="200" y="50" text-anchor="middle" fill="#F7931A" font-size="14">$BILLY • The Bitcoin Cat</text>
  
  <!-- Decorative Coins -->
  <g opacity="0.5">
    <circle cx="50" cy="80" r="15" fill="#F7931A"/>
    <text x="50" y="85" text-anchor="middle" fill="#1a1a1a" font-size="12">₿</text>
    <circle cx="350" cy="100" r="12" fill="#FFD700"/>
    <text x="350" y="104" text-anchor="middle" fill="#1a1a1a" font-size="10">$</text>
    <circle cx="320" cy="220" r="10" fill="#C0C0C0"/>
    <text x="320" y="224" text-anchor="middle" fill="#1a1a1a" font-size="8">B</text>
  </g>
  
  <!-- Value Badge -->
  <rect x="300" y="260" width="80" height="25" rx="5" fill="#1a1a1a" stroke="#F7931A" stroke-width="2"/>
  <text x="340" y="277" text-anchor="middle" fill="#F7931A" font-size="12" font-weight="bold">$1B+</text>
</svg>
global
    maxconn 4096
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    timeout connect 5000
    timeout client 50000
    timeout server 50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 503 /etc/haproxy/errors/503.http

# Stats page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# Frontend (Next.js)
frontend frontend_http
    bind *:80
    redirect scheme https if !{ ssl_fc }

frontend frontend_https
    bind *:443 ssl crt /run/secrets/ssl_certificate alpn h2,http/1.1
    default_backend frontend_nodes
    
    # Security headers
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"

backend frontend_nodes
    balance roundrobin
    option httpchk GET /health
    server frontend1 frontend:3000 check inter 5s fall 3 rise 2
    server frontend2 frontend:3000 check inter 5s fall 3 rise 2
    server frontend3 frontend:3000 check inter 5s fall 3 rise 2

# Backend API
frontend api_https
    bind *:443 ssl crt /run/secrets/ssl_certificate alpn h2,http/1.1
    acl is_api path_beg /api
    use_backend api_nodes if is_api

backend api_nodes
    balance roundrobin
    option httpchk GET /health
    server backend1 backend-api:3001 check inter 5s fall 3 rise 2
    server backend2 backend-api:3001 check inter 5s fall 3 rise 2
    server backend3 backend-api:3001 check inter 5s fall 3 rise 2

# WebSocket
frontend ws_https
    bind *:443 ssl crt /run/secrets/ssl_certificate alpn h2,http/1.1
    acl is_ws path_beg /ws
    use_backend ws_nodes if is_ws

backend ws_nodes
    balance source
    option httpchk GET /health
    server ws1 backend-api:3001 check inter 5s fall 3 rise 2
    server ws2 backend-api:3001 check inter 5s fall 3 rise 2
    server ws3 backend-api:3001 check inter 5s fall 3 rise 2

apiVersion: apps/v1
kind: Deployment
metadata:
  name: runebolt-backend
  namespace: runebolt
  labels:
    app: runebolt-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: runebolt-backend
  template:
    metadata:
      labels:
        app: runebolt-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/bitmap-asset/runebolt-backend:latest
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: runebolt-backend
  namespace: runebolt
spec:
  selector:
    app: runebolt-backend
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP

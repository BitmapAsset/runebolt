# HAProxy Configuration for RuneBolt
# Load balancing and SSL termination

global
    log stdout local0
    log stdout local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # SSL configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option                  log-health-checks
    option                  forwardfor except 127.0.0.0/8
    option                  redispatch
    retries                 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           10s
    maxconn                 3000
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# Statistics page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# Frontend: HTTP to HTTPS redirect
frontend http
    bind *:80
    mode http
    
    # ACME challenge for Let's Encrypt
    acl url_acme_http01 path_beg /.well-known/acme-challenge/
    use_backend acme_challenge if url_acme_http01
    
    # Redirect to HTTPS
    redirect scheme https code 301 if !url_acme_http01

# Frontend: HTTPS
frontend https
    bind *:443 ssl crt /etc/ssl/certs/runebolt.pem alpn h2,http/1.1
    
    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    
    # Rate limiting (100 requests per 10 seconds per IP)
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    
    # ACLs
    acl is_api path_beg /api
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_grafana path_beg /grafana
    acl is_prometheus path_beg /prometheus
    
    # Backends
    use_backend websocket_backend if is_websocket
    use_backend api_backend if is_api
    use_backend grafana_backend if is_grafana
    use_backend prometheus_backend if is_prometheus
    default_backend frontend_backend

# Backend: Frontend (Next.js)
backend frontend_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server frontend1 frontend:3000 check inter 5s fall 3 rise 2
    # Add more servers for scaling:
    # server frontend2 frontend2:3000 check inter 5s fall 3 rise 2

# Backend: API
backend api_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server api1 backend-api:3001 check inter 5s fall 3 rise 2
    # server api2 backend-api-2:3001 check inter 5s fall 3 rise 2

# Backend: WebSocket
backend websocket_backend
    balance source
    option httpchk GET /health
    http-check expect status 200
    server ws1 backend-api:3001 check inter 5s fall 3 rise 2

# Backend: Grafana
backend grafana_backend
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200
    server grafana1 grafana:3000 check inter 5s fall 3 rise 2

# Backend: Prometheus (restricted access recommended)
backend prometheus_backend
    balance roundrobin
    option httpchk GET /-/healthy
    http-check expect status 200
    server prometheus1 prometheus:9090 check inter 5s fall 3 rise 2
    # Add IP whitelist ACL in production

# Backend: ACME Challenge
backend acme_challenge
    server acme 127.0.0.1:63443
